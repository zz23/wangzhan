<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>小园的使用说明</title>

<style>
body{
  margin:0;
  font-family:-apple-system,"PingFang SC",sans-serif;
  overflow:hidden;
  transition:0.4s;
}

/* 🌸 背景 */
body.normal{
  background:linear-gradient(270deg,#fffafa,#fdecec,#fff0f3);
  background-size:400% 400%;
  animation:bgMove 18s ease infinite;
}
body.random{
  background:linear-gradient(270deg,#f3e8ff,#e9d5ff,#f5f3ff);
  background-size:400% 400%;
  animation:bgMove 18s ease infinite;
}
body.test{
  background:linear-gradient(270deg,#f5f5f5,#e5e5e5,#f0f0f0);
  background-size:400% 400%;
  animation:bgMove 18s ease infinite;
}

@keyframes bgMove{
  0%{background-position:0% 50%;}
  50%{background-position:100% 50%;}
  100%{background-position:0% 50%;}
}

/* 首页 */
.home{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
}

.manual{
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:26px;
}

.title{
  font-size:32px;        /* 放大 */
  letter-spacing:6px;    /* 拉开间距（高级感关键） */
  font-weight:500;
  color:#333;
}

.subtitle{
  font-size:12px;
  color:#aaa;
}

.avatar{
  width:140px;
}

.menu{
  display:flex;
  flex-direction:column;
  gap:16px;
}

.menu-btn{
  width:200px;
  padding:14px;
  text-align:center;
  border-radius:999px;
  backdrop-filter:blur(12px);
  border:1px solid rgba(255,180,200,0.3);
  background:rgba(255,255,255,0.35);
  transition:0.25s;
}

.menu-btn.main{color:#ff6b9d;font-size:20px;}

.menu-btn.test{color:#999;font-size:16px;}

.menu-btn:active{transform:scale(0.92);}

/* 第二页 */
.container{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100vh;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  background:inherit;

  transform:translateY(20px);
  opacity:0;
  pointer-events:none;
  transition:0.4s;
}

.container.show{
  transform:translateY(0);
  opacity:1;
  pointer-events:auto;
}

/* 卡片 */
.card{
  width:85%;
  max-width:380px;
  min-height:180px;
  background:rgba(255,255,255,0.5);
  backdrop-filter:blur(18px);
  border-radius:28px;
  padding:28px;
  text-align:center;
  font-size:20px;
}

/* 控制 */
.controls{
  margin-top:24px;
  display:flex;
  align-items:center;
  gap:12px;
}

.action-btn{
  padding:14px 28px;
  border:none;
  border-radius:30px;
  color:#fff;
  position:relative;
  overflow:hidden;
}

body.normal .action-btn{
  background:linear-gradient(135deg,#ff8fab,#ff6b9d);
}

body.test .action-btn{
  background:linear-gradient(135deg,#bbb,#888);
}

.action-btn:active{
  transform:scale(0.92);
}

/* 返回 */
.back-btn{
  position:fixed;
  top:20px;
  left:16px;
  width:36px;
  height:36px;
  border-radius:50%;
  background:rgba(0,0,0,0.2);
  color:#fff;
  display:flex;
  align-items:center;
  justify-content:center;
}

/* 爱心 */
.heart{
  position:absolute;
  font-size:14px;
  pointer-events:none;
  animation:heartMove 0.8s ease forwards;
}

@keyframes heartMove{
  0%{transform:translate(0,0) scale(0.8);opacity:1;}
  100%{transform:translate(var(--x),var(--y)) scale(0.6);opacity:0;}
}
</style>
</head>

<body class="normal">

<!-- 首页 -->
<div class="home" id="home">
  <div class="manual">
    <div class="title">小园的使用说明</div>
    <div class="subtitle">第 1 版：正在了解小园 - 仅供学霸使用</div>
    <img src="avatar.png" class="avatar"/>

    <div class="menu">
      <div class="menu-btn main" onclick="start('normal')">基础说明</div>
     
      <div class="menu-btn test" onclick="start('test')">测试说明</div>
    </div>
  </div>
</div>

<!-- 第二页 -->
<div class="container" id="game">

  <div class="back-btn" onclick="back()">✕</div>

  <div class="card" id="question">点击开始</div>

  <div class="controls">
    <span id="counter">1 / 100</span>
    <button class="action-btn" onclick="next()">回答 / 下一题</button>
  </div>

</div>

<script>
let index=0;
let mode="normal";

/* 主题库 */
const questions=[
"最近有没有一件小事，让你突然觉得挺舒服的？",

"如果今天完全由自己安排，最想把时间花在哪儿？",
"一段特别顺的日子，对你来说通常是什么感觉？",

"平时更容易让你恢复能量的，是独处还是和熟人待着？",

"当生活节奏很满的时候，你通常怎么把自己拉回来？",

"说起周末，你会更偏向怎么过才舒服？",

"比起计划得很满的安排，你会更偏向哪一种？",
"平时会不会有那种，一回到熟悉的空间就松下来的感觉？",
"最近有没有发现，自己其实更适合某一种生活节奏？",
"对你来说，最理想的休息，通常长什么样？",
"如果一个周末完全空出来，你会怎么让它过得舒服一点？",

"聊到看剧或者听小说的时候，你更在意的是内容还是那个状态？",
"有没有哪种内容，一看就会让你马上安静下来？",
"平时会不会有特别固定的放松方式，已经习惯了？",
"如果那天心情有点乱，你一般会先做什么让自己安静下来？",
"有时候你会不会更想躲进自己的小世界里待一会儿？",
"最近有没有一部剧、一本书，或者一个故事让你记得比较久？",
"比起特别热闹的娱乐，你会不会更喜欢安静一点的消遣？",
"什么时候你会觉得，听点东西比说话更舒服？",
"有些内容会让人越看越轻松，你会有这种感觉吗？",
"对你来说，最能帮你“切换状态”的事情是什么？",

"你小时候更习惯哪种生活节奏，现在和那时候像吗？",
"一路到现在，什么地方的你变化得比较明显？",
"有些习惯是慢慢养成的，你会觉得自己有哪种习惯特别稳定吗？",
"成长以后，你觉得自己最明显的变化是什么？",
"过去和现在比起来，你会觉得自己更了解自己了吗？",

"你会不会觉得，自己现在比以前更挑生活状态了？",
"有没有哪一段时间，让你突然发现自己变了不少？",
"如果要说“现在的自己”和“以前的自己”最大的不同，你会先想到什么？",
"哪些东西会让你觉得，自己还是很像以前的那个自己？",

"说到做自己，你会更在意哪一部分？",
"有时候外界声音太多，会不会让你想先慢一点再决定？",
"如果一件事不是特别确定，你一般会先听谁的想法？",
"在你看来，真正适合自己的选择，通常会有什么感觉？",
"有没有哪一次，你明显感觉到自己是被环境影响了？",
"遇到不同声音的时候，你更容易坚持自己，还是先听听看？",
"如果有些事情别人看法很多，你会不会想先回到自己的判断里？",
"你会怎么分辨，一件事到底是自己想要，还是被带着走？",
"有没有哪一刻，你特别想把外界的声音先放一边？",
"最近有没有更想认真看看，什么才是自己真正想要的？",

"慢热这件事，对你来说更像性格，还是一种习惯？",
"熟悉一个人之前，你通常会先看哪些地方？",
"如果一个人很自然，你会更容易放松吗？",
"在关系里，你会不会更喜欢慢一点靠近？",
"你觉得舒服的相处，最重要的一点会是什么？",
"对你来说，什么样的人会让你很快觉得安心？",
"如果两个人节奏不太一样，你通常会怎么相处？",
"你会不会更喜欢那种不太用力，但很顺的感觉？",
"什么时候你会觉得，对方是懂节奏的人？",
"如果相处得越来越自然，你一般会是什么感觉？",

"你比较喜欢别人主动一点，还是留一点空间更舒服？",
"如果对方很急，你会不会下意识先退一步？",
"你更能接受哪种相处方式，轻松一点还是认真一点？",
"有时候，太刻意反而会让人不舒服，你会有这种感觉吗？",
"你会不会更看重相处时的自然感，而不是表面热闹？",
"如果一段关系让你觉得很省心，你通常会怎么判断？",
"你觉得相处里最难的是开始，还是找到舒服的节奏？",
"对你来说，边界感和亲近感之间，哪个更难拿捏？",
"你会不会更喜欢那种不用解释太多，也能懂一点的人？",
"如果对方能尊重你的节奏，你会不会更容易放松？",

"你会不会更愿意先熟起来，再慢慢看别的东西？",
"如果两个人越来越默契，你会把它看成很重要的事吗？",
"你会怎么理解“合适”这两个字？",
"在你看来，一段关系里最不能少的是什么？",
"你会不会更在意对方是不是能让你舒服地做自己？",
"如果一个人让你很轻松，你会不会特别珍惜这种感觉？",
"你会更喜欢稳一点的关系，还是有一点变化也可以？",
"当两个人慢慢变熟，你会更期待什么？",
"你觉得长期相处里，最重要的是稳定，还是舒服？",
"如果未来的相处能越来越自然，你会希望它是什么样？",

"有时候，人会在某个阶段重新认识自己，你有过这种感觉吗？",
"你会不会觉得，自己越来越知道哪些东西适合自己？",
"当你开始更在意自己的感受，生活会有什么变化？",
"最近有没有一件事，让你更确定了自己的想法？",
"如果回头看，你会觉得自己变得更坚定了吗？",
"你会不会越来越不想勉强自己去适应太多？",
"哪些时候你会明显感觉，自己现在比以前更清醒？",
"你会怎么形容现在的自己？",
"如果“像自己”这件事有一个答案，你觉得它更接近什么状态？",
"未来一段时间，你最想让自己多一点什么？"
];

/* 测试题库 */
const testQuestions=[
"你平时最放松的那一刻通常是在什么情况下？",
"你更享受‘完全属于自己的一段时间’还是‘和熟人待在一起’？",
"你觉得一个人待着舒服，是天生的还是慢慢形成的？",
"你最近有没有哪一刻觉得‘这样其实挺好的’？",
"你平时是靠什么方式恢复精力的？",
"你更喜欢慢一点的生活节奏还是偶尔有变化？",
"你有没有发现自己其实挺习惯现在这种生活方式？",
"你觉得真正的放松是‘什么都不做’还是‘做喜欢的事’？",
"你平时更容易被环境影响，还是更坚持自己的节奏？",
"你会不会有那种不想被打扰的时刻？",
"你觉得独处的时候更接近真实的自己吗？",
"你平时更喜欢安静的空间还是稍微有点人气的地方？",
"你有没有一段时间特别想躲开外界？",
"你觉得自己更像‘慢慢进入状态的人’吗？",
"你平时会刻意安排放松时间吗？",
"你觉得你现在的生活状态是你自己选的吗？",
"你更喜欢‘稳定重复’还是‘偶尔变化’？",
"你最近有没有突然觉得某件事其实没那么重要？",
"你更在意舒服还是效率？",
"你会不会更喜欢简单一点的生活方式？",
"你觉得慢热的人是不是更容易想很多？",
"你一般需要多久才会对一个人放松下来？",
"你会更在意别人理解你还是给你空间？",
"你有没有那种一开始没感觉后来慢慢觉得不错的人？",
"你觉得熟起来慢一点是不是反而更稳定？",
"你会不会在关系里比较谨慎？",
"你更喜欢自然熟起来还是一开始就很热络？",
"你觉得舒服的相处是不是不用刻意找话题？",
"你会不会更倾向先观察再决定？",
"你觉得自己更理性还是更感性？",
"你会不会不太习惯表达自己？",
"你更喜欢被问还是主动说？",
"你觉得慢慢建立信任更重要吗？",
"你会不会对新关系有一点防备？",
"你觉得节奏一致重要吗？",
"你更喜欢稳定的人还是有变化的人？",
"你会不会在意别人怎么看你？",
"你觉得‘被理解’是不是挺难的？",
"你有没有那种别人觉得你安静但你其实想很多的时候？",
"你更倾向于慢慢了解一个人吗？",
"你觉得聊天舒服比内容重要吗？",
"你会不会更在意感觉而不是逻辑？",
"你觉得自己是那种需要时间的人吗？",
"你会不会不太喜欢被打扰节奏？",
"你觉得关系里最难的是开始还是维持？",
"你更看重过程还是结果？",
"你会不会更容易和某一类人聊得来？",
"你觉得慢慢靠近是不是更自然？",
"你会不会在熟之前比较克制？",
"你觉得安全感是慢慢来的还是一下就有的？",
"你说你容易被影响，你现在会怎么判断什么是自己的想法？",
"你有没有那种‘我好像不太像自己’的阶段？",
"你觉得做自己更难的是看清自己还是坚持自己？",
"你会不会有时候觉得选择其实不是自己做的？",
"你现在会更相信自己还是外界？",
"你有没有慢慢找回自己的过程？",
"你觉得人会不会被环境改变很多？",
"你有没有意识到自己和以前不一样了？",
"你觉得自己现在更接近真实状态了吗？",
"你会不会有时候想把外界声音关掉？",
"你觉得影响你最大的东西是什么？",
];

function start(m){
  mode=m;
  index=0;
  document.body.className=m;

  document.getElementById("home").style.opacity="0";

  setTimeout(()=>{
    document.getElementById("home").style.display="none";
    document.getElementById("game").classList.add("show");
    next();
  },200);
}

function back(){
  document.getElementById("game").classList.remove("show");
  document.getElementById("home").style.display="flex";
  setTimeout(()=>{
    document.getElementById("home").style.opacity="1";
  },50);
}

function getQuestion(){
  if(mode==="random"){
    return questions[Math.floor(Math.random()*questions.length)];
  }
  if(mode==="test"){
    return testQuestions[index % testQuestions.length];
  }
  return questions[index % questions.length];
}

function hearts(){
  const btn=document.querySelector(".action-btn");
  for(let i=0;i<5;i++){
    const h=document.createElement("div");
    h.className="heart";
    h.innerText="💗";
    h.style.setProperty("--x",(Math.random()*60-30)+"px");
    h.style.setProperty("--y",(Math.random()*-60-10)+"px");
    btn.appendChild(h);
    setTimeout(()=>h.remove(),800);
  }
}

function next(){
  hearts();

  document.getElementById("question").innerText=getQuestion();

  if(mode!=="random"){
    index++;
    document.getElementById("counter").innerText=index+" / 100";
  }else{
    document.getElementById("counter").innerText="随机";
  }
}
</script>

</body>
</html>
